global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alert_rules.yml"

# Alertmanager configuration (update endpoints as needed)
alerting:
  alertmanagers:
    - static_configs:
        - targets: []
          # - alertmanager:9093

scrape_configs:
  # -----------------------------------------------------------------------
  # Static config: local development
  # -----------------------------------------------------------------------
  - job_name: "argus_api"
    static_configs:
      - targets: ["localhost:8000"]
    metrics_path: "/metrics"

  # -----------------------------------------------------------------------
  # Docker / service-discovery: works when argus-api resolves via DNS
  # -----------------------------------------------------------------------
  - job_name: "argus_api_docker"
    dns_sd_configs:
      - names: ["argus-api"]
        type: A
        port: 8000
    metrics_path: "/metrics"

  # -----------------------------------------------------------------------
  # Kubernetes pod discovery (annotation-based, requires k8s RBAC)
  # -----------------------------------------------------------------------
  - job_name: "argus_api_k8s"
    kubernetes_sd_configs:
      - role: pod
        namespaces:
          names: ["argus"]
    relabel_configs:
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
        action: keep
        regex: "true"
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
        action: replace
        target_label: __metrics_path__
        regex: (.+)
      - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
        action: replace
        target_label: __address__
        regex: ([^:]+)(?::\d+)?;(\d+)
        replacement: $1:$2
      - source_labels: [__meta_kubernetes_pod_label_app]
        action: replace
        target_label: job
      - source_labels: [__meta_kubernetes_namespace]
        action: replace
        target_label: namespace
      - source_labels: [__meta_kubernetes_pod_name]
        action: replace
        target_label: pod

