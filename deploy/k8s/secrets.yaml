apiVersion: v1
kind: Secret
metadata:
  name: argus-secrets
  namespace: argus
  labels:
    app.kubernetes.io/name: argus
type: Opaque
# Values are base64-encoded placeholders.
# In production replace with your real secrets, or use an external
# secrets operator (e.g., External Secrets Operator with AWS Secrets Manager).
#
# To encode: echo -n 'your-value' | base64
stringData:
  JWT_SECRET: "CHANGE_ME_IN_PRODUCTION"
  API_KEY_HASH_SECRET: "CHANGE_ME_IN_PRODUCTION"
  POSTGRES_PASSWORD: "argus_k8s_pass"
  POSTGRES_USER: "argus"
  POSTGRES_DB: "argus"
