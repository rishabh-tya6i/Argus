apiVersion: v1
kind: PersistentVolume
metadata:
  name: sandbox-artifacts-pv
  labels:
    app.kubernetes.io/name: argus
    type: local
spec:
  storageClassName: manual
  capacity:
    storage: 20Gi
  accessModes:
    - ReadWriteMany
  hostPath:
    path: /data/sandbox   # Node-local path (suitable for single-node / dev clusters)
  persistentVolumeReclaimPolicy: Retain

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: sandbox-artifacts-pvc
  namespace: argus
  labels:
    app.kubernetes.io/name: argus
spec:
  storageClassName: manual
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 20Gi
